<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YouTube Downloader</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      width: 100%;
      max-width: 500px;
    }
    .form-control, .form-select {
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.2);
      color: white !important;
    }
    .btn-primary { background: #ff0000; border: none; font-weight: bold; }
    .btn-primary:hover { background: #cc0000; }
    #video-preview { display: none; margin-bottom: 15px; border-radius: 10px; width: 100%; }
  </style>
</head>
<body>

<div class="card shadow-lg">
  <div class="card-body p-4 text-center">
    <h2 class="mb-4">YouTube Downloader</h2>
    
    <div class="mb-3 text-start">
      <label class="form-label">Video URL</label>
      <input type="text" class="form-control" id="url" placeholder="Paste link here...">
    </div>

    <div class="mb-4 text-start">
      <label class="form-label">Quality</label>
      <select class="form-select" id="format">
        <option value="bestvideo+bestaudio/best">Highest Quality</option>
        <option value="720p">720p HD</option>
        <option value="480p">480p SD</option>
        <option value="bestaudio/best">Audio Only (MP3/M4A)</option>
      </select>
    </div>

    <button type="button" class="btn btn-primary w-100 py-2" id="btn-submit">Fetch Video</button>

    <div id="loading" class="mt-4" style="display:none;">
      <div class="spinner-border text-danger" role="status"></div>
      <p class="mt-2 text-secondary">Analyzing URL...</p>
    </div>

    <div id="result" class="mt-4" style="display:none;">
      <img id="video-preview" src="" alt="Thumbnail">
      <h6 id="video-title" class="mb-3"></h6>
      <a id="download-btn" class="btn btn-success w-100" href="#" target="_blank">Download File</a>
    </div>
    
    <div id="error-box" class="alert alert-danger mt-3" style="display:none;"></div>
  </div>
</div>

<script>
  const btn = document.getElementById('btn-submit');
  const loading = document.getElementById('loading');
  const resultDiv = document.getElementById('result');
  const errorBox = document.getElementById('error-box');
  const downloadBtn = document.getElementById('download-btn');
  const urlInput = document.getElementById('url');
  const formatSelect = document.getElementById('format');

  btn.addEventListener('click', async () => {
    const url = urlInput.value.trim();
    if (!url) return alert("Please paste a URL");

    // Reset UI
    btn.disabled = true;
    loading.style.display = 'block';
    resultDiv.style.display = 'none';
    errorBox.style.display = 'none';

    try {
      const format = formatSelect.value;
      const response = await fetch(`/get-video?url=${encodeURIComponent(url)}&format=${encodeURIComponent(format)}`);
      const data = await response.json();

      if (!data.success) throw new Error(data.error);

      // Fill in data
      document.getElementById('video-title').textContent = data.title;
      document.getElementById('video-preview').src = data.thumbnail;
      document.getElementById('video-preview').style.display = 'block';
      downloadBtn.href = data.download_url;
      
      resultDiv.style.display = 'block';
    } catch (err) {
      errorBox.textContent = "Error: " + err.message;
      errorBox.style.display = 'block';
    } finally {
      btn.disabled = false;
      loading.style.display = 'none';
    }
  });
</script>

</body>
</html>
